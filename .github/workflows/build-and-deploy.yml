name: Build and Deploy APT Repository

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Step 1: Checkout the Automattic/studio repo
      - name: Checkout Automattic/studio
        uses: actions/checkout@v4
        with:
          repository: Automattic/studio
          path: studio-source

      # Step 2: Setup Node.js from .nvmrc
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'studio-source/.nvmrc'

      # Step 3: Build, Discover, and Package
      - name: Build, Discover, and Package
        run: |
          cd studio-source
          npm install

          # Build the app
          if npm run package; then echo "Built from root"; elif (cd apps/studio && npm run package); then echo "Built from apps"; else exit 1; fi

          # Dynamically find the Electron output folder
          OUT_DIR=$(find . -type d -name "*-linux-x64" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$OUT_DIR" ]; then exit 1; fi

          # Dynamically find the executable binary
          DIR_NAME=$(basename "$OUT_DIR")
          EXPECTED_BIN=${DIR_NAME%-linux-x64}
          BIN_PATH=$(find "$OUT_DIR" -maxdepth 1 -type f -iname "$EXPECTED_BIN" | head -n 1)

          # Fallback for binary
          if [ -z "$BIN_PATH" ]; then
            BIN_PATH=$(find "$OUT_DIR" -maxdepth 1 -type f ! -name "*.*" ! -name "chrome-sandbox" -print0 | xargs -0 ls -S | head -n 1)
          fi

          BIN_NAME=$(basename "$BIN_PATH")
          chmod +x "$BIN_PATH"
          ICON_PATH=$(find . -type f -name "studio-app-icon.png" -not -path "*/node_modules/*" | head -n 1)

          npm install -g electron-installer-debian

          # THE ARCHITECTURE FIX: Added --arch="amd64"
          electron-installer-debian --src="$OUT_DIR" --dest="../public/" --arch="amd64" --options.name="wordpress-studio-unofficial" --options.productName="WordPress Studio (Unofficial)" --options.bin="$BIN_NAME" --options.icon="$ICON_PATH"

      # Step 4: APT Repo Setup
      - name: Setup APT Repository
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils
          cd public && dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz && apt-ftparchive release . > Release

      # Step 5: GPG Import
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      # Step 6: Sign & Export Key
      - name: Sign Release and Export Public Key
        run: cd public && gpg --armor --detach-sign --output Release.gpg Release && gpg --clearsign --output InRelease Release && gpg --armor --export > public.key

      # Step 7: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
